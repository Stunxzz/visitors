{% extends 'base.html' %}
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Създаване на посетител</title>
</head>
<body>
{% block content %}
    <div class="container" style="margin-top: 100px">
        <form method="post" action="{% url 'create_visitor' %}" class="visit_form">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6" style="margin-top: 40px">
                    <div class="form-group" style="display: flex;justify-content: space-between;width: 350px">
                       <div style="flex: 1;">
                           <label for="{{ form.first_name.id_for_label }}">First Name</label>
                       </div>
                        <div style="flex: 1; text-align: right">
                            {{ form.first_name }}
                        </div>
                    </div>
                <div class="form-group" style="display: flex;justify-content: space-between;width: 350px">
                       <div style="flex: 1;">
                           <label for="{{ form.last_name.id_for_label }}">Last Name</label>
                       </div>
                        <div style="flex: 1; text-align: right">
                            {{ form.last_name }}
                        </div>
                </div>
                <div class="form-group" style="display: flex;justify-content: space-between;width: 350px">
                       <div style="flex: 1;">
                           <label for="{{ form.position.id_for_label }}">Position</label>
                       </div>
                        <div style="flex: 1; text-align: right">
                            {{ form.position }}
                        </div>
                </div>
                <div class="form-group" style="display: flex;justify-content: space-between;width: 350px">
                       <div style="flex: 1;">
                           <label for="{{ form.priority.id_for_label }}">Priority</label>
                       </div>
                        <div style="flex: 1; text-align: right;">
                            {{ form.priority }}
                        </div>
                </div>
                <div class="form-group" style="display: flex;justify-content: space-between;width: 350px">
                       <div style="flex: 1;">
                           <label for="{{ form.company_name.id_for_label }}">Company Name</label>
                       </div>
                        <div style="flex: 1; text-align: right">
                            {{ form.company_name }}
                        </div>
                </div>

                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <div style="flex: 1;">
                           <label for="{{ form.purpose_of_visit.id_for_label }}">Purpose of visit</label>
                       </div>
                        <div>
                        {{ form.purpose_of_visit }}
                     </div>
                    </div>
                </div>
            </div>

            <div class="row justify-content-center" style="margin-top: 100px">
                <div class="col-md-12 text-center">
                    <button type="submit" class="btn btn-primary">Next</button>
                </div>
            </div>
        </form>
    </div>
{% endblock %}

</body>
</html>
